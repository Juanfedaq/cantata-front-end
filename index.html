<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO (título, descrição, canonical, Open Graph, robots): gerenciado
         por rota via @unhead/vue — src/composables/useSeo.ts. No build, o
         vite-ssg grava as tags de cada rota pública direto neste <head>. -->
    <meta name="theme-color" content="#11100D">
    <link rel="manifest" href="/site.webmanifest">
    <script>
      // Contraparte do public/404.html (fallback de SPA em host estático):
      // restaura a URL real codificada como /?/rota&query antes do app montar.
      // Precisa rodar antes do gtag('config'), que captura a URL da página.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0PFYV4EK1R"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())

      gtag('config', 'G-0PFYV4EK1R')
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
