    <script>
      // Contraparte do public/404.html (fallback de SPA em host estático):
      // restaura a URL real codificada como /?/rota&query antes do app montar.
      // Precisa rodar antes do gtag('config'), que captura a URL da página.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0PFYV4EK1R"></script>

      function gtag() {

      }
      gtag('js', new Date())

      gtag('config', 'G-0PFYV4EK1R')
    </script>
